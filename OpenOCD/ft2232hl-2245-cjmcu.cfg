ftdi device_desc "CJMCU-2232HL"
adapter driver ftdi
ftdi vid_pid 0x0403 0x6014

ftdi channel 0

ftdi layout_init 0x0008 0x001b
ftdi layout_signal nSRST -data 0x0010 -oe 0x0040
ftdi layout_signal nTRST -data 0x0020 -oe 0x0040

